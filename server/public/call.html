<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Organizer - Appel</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  #status-bar {
    padding: 12px 20px;
    text-align: center;
    font-size: 14px;
    background: rgba(0,0,0,0.3);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }
  #status-bar .duration {
    font-variant-numeric: tabular-nums;
    font-weight: 600;
  }
  #status-bar .state {
    color: #aaa;
  }
  #status-bar .state.connected {
    color: #4CAF50;
  }
  #status-bar .state.error {
    color: #f44336;
  }
  #video-container {
    flex: 1;
    position: relative;
    background: #0f0f23;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #remote-video {
    width: 100%;
    height: 100%;
    object-fit: contain;
    background: #000;
  }
  #remote-video.audio-only {
    display: none;
  }
  .audio-only-placeholder {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    color: #aaa;
    font-size: 18px;
  }
  .audio-only-placeholder.visible {
    display: flex;
  }
  .audio-only-placeholder .icon {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    background: rgba(255,255,255,0.1);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 36px;
  }
  #local-video {
    position: absolute;
    bottom: 100px;
    right: 20px;
    width: 160px;
    height: 120px;
    border-radius: 12px;
    object-fit: cover;
    background: #222;
    border: 2px solid rgba(255,255,255,0.2);
    z-index: 10;
  }
  #local-video.hidden { display: none; }
  #controls {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    padding: 20px;
    background: rgba(0,0,0,0.5);
  }
  .ctrl-btn {
    width: 52px;
    height: 52px;
    border-radius: 50%;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    transition: background 0.2s, transform 0.1s;
    background: rgba(255,255,255,0.15);
    color: #fff;
  }
  .ctrl-btn:hover { background: rgba(255,255,255,0.25); transform: scale(1.05); }
  .ctrl-btn:active { transform: scale(0.95); }
  .ctrl-btn.off { background: rgba(244, 67, 54, 0.7); }
  .ctrl-btn.hangup { background: #f44336; width: 64px; height: 64px; font-size: 24px; }
  .ctrl-btn.hangup:hover { background: #d32f2f; }
  .ctrl-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  #error-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    z-index: 100;
    padding: 20px;
    text-align: center;
  }
  #error-overlay.visible { display: flex; }
  #error-overlay .error-msg { color: #f44336; font-size: 18px; max-width: 500px; }
  #error-overlay button {
    padding: 10px 24px;
    border-radius: 8px;
    border: none;
    background: #6B9FFF;
    color: #fff;
    font-size: 16px;
    cursor: pointer;
  }
  /* SVG icons inline */
  .icon-svg { fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
</style>
</head>
<body>

<div id="status-bar">
  <span id="state-text" class="state">Connexion...</span>
  <span id="duration" class="duration" style="display:none">00:00</span>
</div>

<div id="video-container">
  <video id="remote-video" autoplay playsinline></video>
  <div id="audio-placeholder" class="audio-only-placeholder">
    <div class="icon">&#x1F3A7;</div>
    <div id="remote-name">Appel audio</div>
  </div>
  <video id="local-video" autoplay playsinline muted class="hidden"></video>
</div>

<div id="controls">
  <button id="btn-mic" class="ctrl-btn" title="Micro">
    <svg width="24" height="24" viewBox="0 0 24 24" class="icon-svg"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
  </button>
  <button id="btn-cam" class="ctrl-btn" title="Caméra">
    <svg width="24" height="24" viewBox="0 0 24 24" class="icon-svg"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>
  </button>
  <button id="btn-hangup" class="ctrl-btn hangup" title="Raccrocher">
    <svg width="24" height="24" viewBox="0 0 24 24" class="icon-svg"><path d="M10.68 13.31a16 16 0 0 0 3.41 2.6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 4 .64 2 2 0 0 1 2 2v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 5.33 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L9.31 9.91" transform="rotate(135 12 12)"/></svg>
  </button>
</div>

<div id="error-overlay">
  <div class="error-msg" id="error-msg"></div>
  <button onclick="window.close()">Fermer</button>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
(function() {
  'use strict';

  // --- Parse hash params ---
  const hash = window.location.hash.substring(1);
  const params = {};
  hash.split('&').forEach(pair => {
    const [k, v] = pair.split('=');
    if (k) params[decodeURIComponent(k)] = decodeURIComponent(v || '');
  });

  const token = params.token;
  const mode = params.mode; // 'caller' or 'receiver'
  const targetUserId = params.target || params.from; // target for caller, from for receiver
  const withCamera = params.camera === 'true';

  // Clear hash from URL immediately (don't leak token in history)
  history.replaceState(null, '', window.location.pathname);

  if (!token || !mode || !targetUserId) {
    showError('Paramètres manquants. Fermez cet onglet et réessayez depuis l\'application.');
    return;
  }

  // --- ICE servers (same as Tauri app) ---
  const ICE_SERVERS = {
    iceServers: [
      { urls: 'stun:stun.l.google.com:19302' },
      { urls: 'stun:stun1.l.google.com:19302' },
      { urls: 'turn:51.210.150.25:3478', username: 'organizer', credential: 'SecurePassword123!' },
    ],
  };

  // --- State ---
  let pc = null;
  let localStream = null;
  let remoteStream = null;
  let isMicEnabled = true;
  let isCameraEnabled = withCamera;
  let remoteHasCamera = false;
  let callConnected = false;
  let callDuration = 0;
  let durationInterval = null;
  const pendingCandidates = [];

  // --- DOM ---
  const stateText = document.getElementById('state-text');
  const durationEl = document.getElementById('duration');
  const remoteVideo = document.getElementById('remote-video');
  const localVideo = document.getElementById('local-video');
  const audioPlaceholder = document.getElementById('audio-placeholder');
  const remoteName = document.getElementById('remote-name');
  const btnMic = document.getElementById('btn-mic');
  const btnCam = document.getElementById('btn-cam');
  const btnHangup = document.getElementById('btn-hangup');
  const errorOverlay = document.getElementById('error-overlay');
  const errorMsg = document.getElementById('error-msg');

  // --- Socket.io ---
  const serverUrl = window.location.origin;
  const socket = io(serverUrl, {
    auth: { token, clientType: 'desktop' },
    transports: ['polling', 'websocket'],
  });

  socket.on('connect', () => {
    console.log('[BrowserCall] Socket connected, mode:', mode);
    stateText.textContent = mode === 'caller' ? 'Appel en cours...' : 'Connexion...';
    startCallFlow();
  });

  socket.on('connect_error', (err) => {
    console.error('[BrowserCall] Socket connection error:', err.message);
    showError('Erreur de connexion au serveur: ' + err.message);
  });

  socket.on('disconnect', (reason) => {
    console.log('[BrowserCall] Socket disconnected:', reason);
    if (callConnected) {
      stateText.textContent = 'Déconnecté';
      stateText.className = 'state error';
    }
  });

  // --- Call signaling ---
  socket.on('call:accept', (data) => {
    console.log('[BrowserCall] call:accept from', data.from);
    remoteHasCamera = data.withCamera;
    onCallConnected();
  });

  socket.on('call:reject', () => {
    console.log('[BrowserCall] call:reject');
    stateText.textContent = 'Appel refusé';
    stateText.className = 'state error';
    setTimeout(() => cleanup(), 2000);
  });

  socket.on('call:end', () => {
    console.log('[BrowserCall] call:end');
    stateText.textContent = 'Appel terminé';
    stateText.className = 'state';
    setTimeout(() => cleanup(), 1500);
  });

  socket.on('call:toggle-camera', (data) => {
    remoteHasCamera = data.enabled;
    updateRemoteVideoVisibility();
  });

  socket.on('call:error', (data) => {
    console.error('[BrowserCall] call:error:', data);
    showError('Erreur: ' + data.message);
  });

  socket.on('webrtc:error', (data) => {
    console.error('[BrowserCall] webrtc:error:', data);
    showError('Erreur WebRTC: ' + data.message);
  });

  // --- WebRTC signaling ---
  socket.on('webrtc:offer', async (data) => {
    console.log('[BrowserCall] webrtc:offer from', data.from);
    if (!pc) createPeerConnection();

    // Glare: if we're caller and already sent offer, ignore
    if (mode === 'caller' && pc.signalingState === 'have-local-offer') {
      console.log('[BrowserCall] Ignoring offer (glare - we are caller)');
      return;
    }

    try {
      await pc.setRemoteDescription(new RTCSessionDescription(data.offer));
      await processPendingCandidates();

      if (localStream) {
        const answer = await pc.createAnswer();
        await pc.setLocalDescription(answer);
        socket.emit('webrtc:answer', { to: data.from, answer });
        console.log('[BrowserCall] Answer sent');
      }
    } catch (err) {
      console.error('[BrowserCall] Failed to handle offer:', err);
    }
  });

  socket.on('webrtc:answer', async (data) => {
    console.log('[BrowserCall] webrtc:answer from', data.from);
    if (!pc) return;
    if (pc.signalingState !== 'have-local-offer') {
      console.log('[BrowserCall] Ignoring answer - state:', pc.signalingState);
      return;
    }

    try {
      await pc.setRemoteDescription(new RTCSessionDescription(data.answer));
      await processPendingCandidates();
    } catch (err) {
      console.error('[BrowserCall] Failed to handle answer:', err);
    }
  });

  socket.on('webrtc:ice-candidate', async (data) => {
    if (!pc || !pc.remoteDescription) {
      pendingCandidates.push(data.candidate);
      return;
    }
    try {
      await pc.addIceCandidate(new RTCIceCandidate(data.candidate));
    } catch (err) {
      console.error('[BrowserCall] Failed to add ICE candidate:', err);
    }
  });

  socket.on('webrtc:close', () => {
    console.log('[BrowserCall] webrtc:close');
    stateText.textContent = 'Appel terminé';
    cleanup();
  });

  // --- Functions ---
  function createPeerConnection() {
    pc = new RTCPeerConnection(ICE_SERVERS);

    pc.onicecandidate = (event) => {
      if (event.candidate) {
        socket.emit('webrtc:ice-candidate', { to: targetUserId, candidate: event.candidate.toJSON() });
      }
    };

    pc.ontrack = (event) => {
      console.log('[BrowserCall] Remote track:', event.track.kind);
      if (event.streams[0]) {
        remoteStream = event.streams[0];
        remoteVideo.srcObject = event.streams[0];
      }
    };

    pc.onconnectionstatechange = () => {
      console.log('[BrowserCall] connectionState:', pc.connectionState);
      if (pc.connectionState === 'connected') {
        onCallConnected();
      } else if (pc.connectionState === 'failed') {
        stateText.textContent = 'Connexion échouée';
        stateText.className = 'state error';
        cleanup();
      }
    };

    pc.oniceconnectionstatechange = () => {
      console.log('[BrowserCall] iceConnectionState:', pc.iceConnectionState);
      if (pc.iceConnectionState === 'disconnected') {
        stateText.textContent = 'Reconnexion...';
        stateText.className = 'state';
      } else if (pc.iceConnectionState === 'connected' || pc.iceConnectionState === 'completed') {
        if (callConnected) {
          stateText.textContent = 'Connecté';
          stateText.className = 'state connected';
        }
      } else if (pc.iceConnectionState === 'failed') {
        stateText.textContent = 'Connexion échouée';
        stateText.className = 'state error';
      }
    };

    return pc;
  }

  async function processPendingCandidates() {
    if (!pc || !pc.remoteDescription) return;
    for (const c of pendingCandidates) {
      try { await pc.addIceCandidate(new RTCIceCandidate(c)); } catch (e) { console.error(e); }
    }
    pendingCandidates.length = 0;
  }

  async function startCallFlow() {
    try {
      // Get local media
      localStream = await navigator.mediaDevices.getUserMedia({
        audio: true,
        video: withCamera,
      });

      // Show local video
      if (withCamera) {
        localVideo.srcObject = localStream;
        localVideo.classList.remove('hidden');
      }
      isCameraEnabled = withCamera;
      updateCamButton();

      createPeerConnection();

      // Add tracks to PC
      localStream.getTracks().forEach(track => pc.addTrack(track, localStream));

      if (mode === 'caller') {
        // Create and send offer
        const offer = await pc.createOffer();
        await pc.setLocalDescription(offer);
        socket.emit('webrtc:offer', { to: targetUserId, offer });
        socket.emit('call:request', { to: targetUserId, withCamera });
        stateText.textContent = 'Appel en cours...';
      } else {
        // Receiver: send accept + wait for offer to create answer
        socket.emit('call:accept', { to: targetUserId, withCamera });
        stateText.textContent = 'Connexion...';
      }
    } catch (err) {
      console.error('[BrowserCall] Failed to start call flow:', err);
      showError('Impossible d\'accéder au micro/caméra: ' + err.message);
    }
  }

  function onCallConnected() {
    if (callConnected) return;
    callConnected = true;
    stateText.textContent = 'Connecté';
    stateText.className = 'state connected';
    durationEl.style.display = '';
    updateRemoteVideoVisibility();

    durationInterval = setInterval(() => {
      callDuration++;
      const m = String(Math.floor(callDuration / 60)).padStart(2, '0');
      const s = String(callDuration % 60).padStart(2, '0');
      durationEl.textContent = m + ':' + s;
    }, 1000);
  }

  function updateRemoteVideoVisibility() {
    if (remoteHasCamera) {
      remoteVideo.classList.remove('audio-only');
      audioPlaceholder.classList.remove('visible');
    } else {
      remoteVideo.classList.add('audio-only');
      audioPlaceholder.classList.add('visible');
    }
  }

  function cleanup() {
    if (durationInterval) clearInterval(durationInterval);
    if (localStream) {
      localStream.getTracks().forEach(t => t.stop());
      localStream = null;
    }
    if (pc) {
      pc.close();
      pc = null;
    }
    socket.disconnect();

    // Disable controls
    btnMic.disabled = true;
    btnCam.disabled = true;
    btnHangup.disabled = true;
  }

  function showError(msg) {
    errorMsg.textContent = msg;
    errorOverlay.classList.add('visible');
    cleanup();
  }

  function updateMicButton() {
    btnMic.classList.toggle('off', !isMicEnabled);
    btnMic.title = isMicEnabled ? 'Couper le micro' : 'Activer le micro';
  }

  function updateCamButton() {
    btnCam.classList.toggle('off', !isCameraEnabled);
    btnCam.title = isCameraEnabled ? 'Couper la caméra' : 'Activer la caméra';
  }

  // --- Controls ---
  btnMic.addEventListener('click', () => {
    if (!localStream) return;
    const audioTrack = localStream.getAudioTracks()[0];
    if (audioTrack) {
      audioTrack.enabled = !audioTrack.enabled;
      isMicEnabled = audioTrack.enabled;
      updateMicButton();
    }
  });

  btnCam.addEventListener('click', async () => {
    if (!localStream || !pc) return;

    if (isCameraEnabled) {
      // Disable camera
      const videoTracks = localStream.getVideoTracks();
      const videoSender = pc.getSenders().find(s => s.track && s.track.kind === 'video');
      if (videoSender) await videoSender.replaceTrack(null);
      videoTracks.forEach(t => { t.stop(); localStream.removeTrack(t); });
      localVideo.classList.add('hidden');
      localVideo.srcObject = null;
      isCameraEnabled = false;
      socket.emit('call:toggle-camera', { to: targetUserId, enabled: false });
    } else {
      // Enable camera
      try {
        const videoStream = await navigator.mediaDevices.getUserMedia({ video: true });
        const videoTrack = videoStream.getVideoTracks()[0];
        localStream.addTrack(videoTrack);

        const videoSender = pc.getSenders().find(s => s.track === null || (s.track && s.track.kind === 'video'));
        if (videoSender) {
          await videoSender.replaceTrack(videoTrack);
        } else {
          pc.addTrack(videoTrack, localStream);
        }

        localVideo.srcObject = localStream;
        localVideo.classList.remove('hidden');
        isCameraEnabled = true;
        socket.emit('call:toggle-camera', { to: targetUserId, enabled: true });
      } catch (err) {
        console.error('[BrowserCall] Failed to enable camera:', err);
      }
    }
    updateCamButton();
  });

  btnHangup.addEventListener('click', () => {
    socket.emit('call:end', { to: targetUserId });
    socket.emit('webrtc:close', { to: targetUserId });
    stateText.textContent = 'Appel terminé';
    stateText.className = 'state';
    cleanup();
  });

  // Cleanup on page close
  window.addEventListener('beforeunload', () => {
    if (pc) {
      socket.emit('call:end', { to: targetUserId });
      socket.emit('webrtc:close', { to: targetUserId });
    }
    cleanup();
  });

  document.title = 'Organizer - Appel ' + (mode === 'caller' ? 'sortant' : 'entrant');
})();
</script>
</body>
</html>
